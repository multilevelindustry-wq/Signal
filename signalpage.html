<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Details</title>

<style>
body{font-family:Arial;background:#0f172a;color:white;padding:20px;margin:0}
.box{background:#1e293b;padding:20px;border-radius:10px}
.tp{margin:10px 0;padding:10px;background:#334155;border-radius:6px}
.ad{background:white;padding:10px;margin:15px 0;border-radius:8px;text-align:center}
.floating-ad{position:fixed;bottom:-300px;right:10px;background:white;padding:5px;border-radius:10px;z-index:1000;width:100px;height:200px}
</style>

</head>
<body>

<!-- ✅ TOP BANNER -->
<div class="ad" id="topAd"></div>

<div class="box" id="detail"></div>

<!-- ✅ BOTTOM BANNER -->
<div class="ad" id="bottomAd"></div>

<!-- ✅ FLOATING ADS -->
<div class="floating-ad" id="floatingAd"></div>

<script>

// ✅ UNIVERSAL AD LOADER (SAME AS MAIN PAGE)
function loadAd(containerId, adKey, width, height){
  let container = document.getElementById(containerId);

  let script1 = document.createElement('script');
  script1.innerHTML = `
    atOptions = {
      'key' : '${adKey}',
      'format' : 'iframe',
      'height' : ${height},
      'width' : ${width},
      'params' : {}
    };
  `;

  let script2 = document.createElement('script');
  script2.src = `https://www.highperformanceformat.com/${adKey}/invoke.js`;

  container.innerHTML = "";
  container.appendChild(script1);
  container.appendChild(script2);
}


// ✅ LOAD ADS (CHANGE KEYS ANYTIME)
loadAd("topAd","e2c16c7361085c6a9c4a3be123312563",728,90);
loadAd("bottomAd","e2c16c7361085c6a9c4a3be123312563",728,90);


// ✅ LOAD SIGNAL DETAILS
let s = JSON.parse(localStorage.getItem('selectedSignal'));
let d = document.getElementById('detail');

if(s){
 d.innerHTML=`
 <h2>${s.pair}</h2>
 <p>${s.type}</p>
 <p>Stop Loss: ${s.sl} pips</p>
 <div class="tp">TP1: ${s.tp1}</div>
 <div class="tp">TP2: ${s.tp2}</div>
 <div class="tp">TP3: ${s.tp3}</div>
 `;
}


// ✅ FLOATING ADS ROTATION (USE MULTIPLE AD KEYS)
const floatingAds = [
  "e2c16c7361085c6a9c4a3be123312563",
  "e2c16c7361085c6a9c4a3be123312563",
  "e2c16c7361085c6a9c4a3be123312563"
];

let currentAd = 0;

function rotateFloatingAd(){
  loadAd("floatingAd", floatingAds[currentAd], 120, 120);
  currentAd = (currentAd + 1) % floatingAds.length;
}

rotateFloatingAd();
setInterval(rotateFloatingAd, 5000);

</script>

</body>
</html>
